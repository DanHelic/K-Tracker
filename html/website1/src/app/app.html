<header>
  <nav class="topBar">
    <a routerLink="/" style="grid-area: logo">
      <img class="logo" src="assets/pictures/logo.png">
    </a>
    <a routerLink="/" routerLinkActive="active" class="links">Start</a>
    <a routerLink="/seite2" routerLinkActive="active" class="links" style="grid-area: link2;">Seite 2</a>
    <a routerLink="/purchases" routerLinkActive="active" class="links" style="grid-area: link3;">Meine Einfäufe</a>
    <a routerLink="/items" routerLinkActive="active" class="links" style="grid-area: link4;">Meine Gegenstände</a>
  </nav>

  <form class="loginForm" id="loginForm" (ngSubmit)="login()">
    <label for="userNameInput" class ="credentialLabel" style="grid-area: userNameLabel">Benutzername:</label>
    <input class ="credentialText" [(ngModel)]="user_name" id="userNameInput" name="user_name" autocomplete="username">
    <label for="passwordInput" class ="credentialLabel" style="grid-area: passwordLabel">Passwort:</label>
    <input class ="credentialText" [(ngModel)]="password" id="passwordInput" name="password" type="password" autocomplete="current-password">
    
  </form>

  <button type="submit" form="loginForm" class ="login" mat-raised-button color="primary" id="loginButton" hidden>Anmelden</button>
  <button class ="createAccount" mat-raised-button color="primary" id="createAccountButton" (click)="createAccount()" hidden>Erstellen</button>
  <button class ="logout" mat-raised-button color="primary" id="logoutButton" (click)="logout()" hidden>Abmelden</button>
</header>

<router-outlet></router-outlet>
