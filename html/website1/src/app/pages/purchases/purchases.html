<div class="table-search-pagination">
  <div class="search-add">
    <mat-form-field class="search-field">
      <mat-label>Suchen</mat-label>
      <input matInput (input)="applySearch($event)" placeholder="Einkauf" #input>
    </mat-form-field>
    <button matFab extended class="add" [routerLink]="['/purchase', 'new']">
      <mat-icon>add</mat-icon>
      Neuen Einkauf hinzufügen
    </button>
  </div>

  <div class="table-wrapper mat-elevation-z8">
    <table mat-table [dataSource]="dataSource" matSort [matSortDisableClear]="true">

      <ng-container matColumnDef="purchase_name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
        <td mat-cell *matCellDef="let row"> {{row.purchase_name}} </td>
      </ng-container>

      <ng-container matColumnDef="total_price">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Preis </th>
        <td mat-cell *matCellDef="let row"> {{row.total_price}}€ </td>
      </ng-container>

      <ng-container matColumnDef="item_count">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Anzahl der Gegenstände </th>
        <td mat-cell *matCellDef="let row"> {{row.item_count}} </td>
      </ng-container>

      <ng-container matColumnDef="purchased_at">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Datum </th>
        <td mat-cell *matCellDef="let row"> {{row.purchased_at}} </td>
      </ng-container>

      <ng-container matColumnDef="store">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Geschäft </th>
        <td mat-cell *matCellDef="let row"> {{row.store?.name}} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" [routerLink]="['/purchase', row.purchase_id]"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="5">Keine Daten für "{{input.value}}" gefunden</td>
      </tr>
    </table>

    <mat-paginator [length]="totalItems" [pageSize]="pageSize" [pageSizeOptions]="[15, 25, 50, 100]" aria-label="Select page of users"></mat-paginator>
  </div>
</div>
